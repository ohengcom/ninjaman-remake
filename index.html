<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#07070f" />
    <meta
      name="description"
      content="Cyber Ninja - A modern, high-definition action-platformer built with Phaser 4 + TypeScript + Vite. Experience tactical combat, custom synthetics, and detailed vector aesthetics."
    />
    <title>Cyber Ninja - Modern HD Platformer</title>
    
    <!-- Google Web Fonts for futuristic and clean typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='28' fill='%2307070f'/><rect x='14' y='28' width='36' height='8' fill='%23e94560' rx='4'/></svg>" />
    
    <style>
      :root {
        --bg: #030308;
        --panel: rgba(13, 13, 27, 0.75);
        --accent: #e94560;
        --cyan: #00ffff;
        --neon-green: #00ff55;
        --amber: #f39c12;
        --muted: #6b6b8d;
        --light: #f6f5f5;
        --glow-cyan: 0 0 15px rgba(0, 255, 255, 0.5), inset 0 0 10px rgba(0, 255, 255, 0.3);
        --glow-magenta: 0 0 15px rgba(233, 69, 96, 0.5);
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        height: 100%;
        background: radial-gradient(ellipse at center, #110e20 0%, #030308 100%);
        font-family: 'Inter', sans-serif;
        color: var(--light);
        overflow: hidden;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }
      
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        gap: 16px;
        padding: 16px;
      }
      
      /* Wrapper to hold Phaser Canvas and Hybrid HTML/CSS UI Overlay */
      #game-container {
        position: relative;
        width: min(calc(100vw - 32px), 1280px, calc((100vh - 92px) * 16 / 9));
        aspect-ratio: 16 / 9;
        flex: 0 0 auto;
        border: 2px solid rgba(0, 255, 255, 0.4);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 0 50px rgba(0, 255, 255, 0.15), 0 12px 40px rgba(0, 0, 0, 0.8);
        background: #0d0d1b;
      }
      
      #game-container canvas {
        display: block;
      }

      /* ==========================================
         DOM HYBRID OVERLAY LAYERS
         ========================================== */
      .game-ui-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none; /* Let clicks pass through to canvas by default */
        z-index: 10;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 24px;
      }

      .interactive {
        pointer-events: auto; /* Re-enable clicks for specific buttons */
      }

      /* Header Panel */
      .hud-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        width: 100%;
      }

      /* Modern High-Tech Integrity Bar */
      .integrity-panel {
        display: flex;
        flex-direction: column;
        gap: 6px;
        background: rgba(3, 3, 8, 0.6);
        border: 1px solid rgba(0, 255, 255, 0.2);
        border-radius: 8px;
        padding: 8px 16px 10px 12px;
        backdrop-filter: blur(8px);
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }

      .integrity-label {
        font-family: 'Orbitron', sans-serif;
        font-size: 11px;
        letter-spacing: 0.15em;
        color: var(--cyan);
        text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
      }

      .bar-container {
        position: relative;
        width: 220px;
        height: 18px;
        background: rgba(255, 255, 255, 0.05);
        border: 1.5px solid rgba(255, 255, 255, 0.15);
        clip-path: polygon(0 0, 95% 0, 100% 100%, 0% 100%);
        overflow: hidden;
      }

      .integrity-bar {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, var(--neon-green) 0%, #00ffff 100%);
        box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.4);
        transition: width 0.2s cubic-bezier(0.1, 0.8, 0.2, 1);
      }

      /* Blinking red warning below 30% HP */
      .critical-hp {
        animation: criticalBlink 0.6s infinite alternate;
      }

      .hp-numeric {
        position: absolute;
        right: 25px;
        top: 50%;
        transform: translateY(-50%);
        font-family: 'Orbitron', sans-serif;
        font-size: 10px;
        font-weight: 700;
        color: var(--light);
        text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      }

      /* Level / Sector Displays */
      .sector-panel {
        font-family: 'Orbitron', sans-serif;
        font-size: 20px;
        font-weight: 900;
        letter-spacing: 0.08em;
        color: #ffffff;
        background: linear-gradient(180deg, #ffffff 0%, #00ffff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 8px rgba(0, 255, 255, 0.6));
        border: 1px solid rgba(0, 255, 255, 0.25);
        border-radius: 8px;
        background-color: rgba(3, 3, 8, 0.5);
        backdrop-filter: blur(8px);
        padding: 6px 20px;
      }

      /* Score readout */
      .score-panel {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        background: rgba(3, 3, 8, 0.6);
        border: 1px solid rgba(233, 69, 96, 0.2);
        border-radius: 8px;
        padding: 8px 16px;
        backdrop-filter: blur(8px);
      }

      .score-label {
        font-family: 'Orbitron', sans-serif;
        font-size: 9px;
        color: var(--muted);
        letter-spacing: 0.2em;
      }

      .score-value {
        font-family: 'Orbitron', sans-serif;
        font-size: 26px;
        font-weight: 700;
        color: var(--accent);
        text-shadow: var(--glow-magenta);
      }

      /* DMC Style Rank Display (Floating Hologram) */
      .style-meter-container {
        position: absolute;
        top: 110px;
        right: 24px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        opacity: 0;
        transform: scale(0.5);
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .style-meter-container.active {
        opacity: 1;
        transform: scale(1);
      }

      .style-rank-letter {
        font-family: 'Orbitron', sans-serif;
        font-size: 72px;
        font-weight: 900;
        line-height: 0.9;
        font-style: italic;
        text-align: right;
      }

      .rank-c { color: var(--muted); text-shadow: 0 0 10px rgba(107, 107, 141, 0.8); }
      .rank-b { color: var(--cyan); text-shadow: 0 0 15px rgba(0, 255, 255, 0.9); }
      .rank-a { color: var(--neon-green); text-shadow: 0 0 15px rgba(0, 255, 85, 0.9); }
      .rank-s { color: var(--amber); text-shadow: 0 0 20px rgba(243, 156, 18, 0.9); }
      .rank-sss { 
        color: #ffffff; 
        text-shadow: 0 0 10px #ffffff, 0 0 25px var(--accent), 0 0 45px var(--accent);
        animation: sssFlame 0.4s infinite alternate;
      }

      /* HUD Footer controls */
      .hud-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        background: rgba(3, 3, 8, 0.7);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding: 8px 16px;
        border-radius: 8px;
        backdrop-filter: blur(8px);
        font-size: 11px;
        letter-spacing: 0.05em;
        color: var(--muted);
      }

      .hud-footer kbd {
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        padding: 1px 6px;
        margin: 0 2px;
        color: var(--light);
        font-family: monospace;
      }

      .sound-indicator {
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        color: var(--muted);
        cursor: pointer;
        transition: color 0.2s;
      }
      .sound-indicator.on {
        color: var(--cyan);
        text-shadow: 0 0 8px rgba(0, 255, 255, 0.6);
      }

      /* ==========================================
         GLASSMORPHIC FULLSCREEN TERMINAL OVERLAYS
         ========================================== */
      .fullscreen-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 20;
        background: rgba(3, 3, 8, 0.75);
        backdrop-filter: blur(12px);
        display: none;
        align-items: center;
        justify-content: center;
        animation: overlayFadeIn 0.2s ease-out;
      }

      /* Cyber Enhancements Menu (Skill Tree) Panel */
      .terminal-panel {
        width: 580px;
        background: var(--panel);
        border: 2px solid var(--cyan);
        border-radius: 16px;
        box-shadow: 0 0 40px rgba(0, 255, 255, 0.25);
        padding: 32px;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        text-align: center;
        animation: panelZoomIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      /* Cyber grid aesthetic elements */
      .terminal-panel::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: 14px;
        background: linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 20px 20px;
        pointer-events: none;
      }

      .terminal-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 0.1em;
        color: var(--cyan);
        text-shadow: var(--glow-cyan);
        margin-bottom: -5px;
      }

      .terminal-sp {
        font-family: 'Orbitron', sans-serif;
        font-size: 18px;
        color: var(--accent);
        text-shadow: var(--glow-magenta);
        font-weight: 700;
        border: 1px solid rgba(233, 69, 96, 0.4);
        padding: 4px 18px;
        border-radius: 20px;
        background: rgba(233, 69, 96, 0.08);
      }

      .terminal-hp-status {
        font-size: 14px;
        color: var(--light);
        opacity: 0.9;
        margin-bottom: 5px;
      }

      /* Cyber Glass Buttons */
      .skill-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
      }

      .skill-btn {
        width: 100%;
        background: rgba(255, 255, 255, 0.03);
        border: 1.5px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--light);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        text-align: left;
      }

      .skill-btn:hover {
        background: rgba(0, 255, 255, 0.08);
        border-color: var(--cyan);
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        transform: translateY(-2px);
      }

      .skill-btn:active {
        transform: translateY(0);
      }

      .skill-btn.maxed {
        border-color: var(--neon-green);
        background: rgba(0, 255, 85, 0.04);
        color: var(--neon-green);
        pointer-events: none;
      }

      .skill-btn.cost-hp { color: var(--neon-green); }
      .skill-btn.cost-combo { color: var(--amber); }
      .skill-btn.cost-dash { color: var(--cyan); }

      .close-panel-tip {
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.1em;
        margin-top: 10px;
      }

      /* Shake animation for invalid actions (e.g. no SP) */
      @keyframes btnShake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        75% { transform: translateX(6px); }
      }
      .shake {
        animation: btnShake 0.2s ease-in-out 2;
        border-color: var(--accent) !important;
        box-shadow: 0 0 15px rgba(233, 69, 96, 0.3) !important;
      }

      /* Game Pause Overlay Panel */
      .pause-panel {
        text-align: center;
      }

      .pause-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 40px;
        font-weight: 900;
        color: var(--cyan);
        text-shadow: var(--glow-cyan);
        letter-spacing: 0.2em;
        animation: pulseGlitch 1.5s infinite alternate;
      }

      /* Game Over Overlay Panel (Win/Lose terminal) */
      .gameover-panel {
        width: 520px;
        border-color: var(--accent);
        box-shadow: 0 0 40px rgba(233, 69, 96, 0.25);
      }

      .gameover-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 44px;
        font-weight: 900;
        color: var(--accent);
        text-shadow: var(--glow-magenta);
        letter-spacing: 0.1em;
      }
      .gameover-title.win {
        color: var(--cyan);
        text-shadow: var(--glow-cyan);
      }

      .gameover-score-row {
        font-size: 20px;
        font-weight: 600;
        margin: 15px 0;
      }

      .restart-btn {
        background: var(--accent);
        border: none;
        border-radius: 8px;
        color: white;
        font-family: 'Orbitron', sans-serif;
        font-size: 16px;
        font-weight: 700;
        padding: 12px 32px;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
      }

      .restart-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        background: #ff5577;
      }

      /* ==========================================
         KEYFRAME ANIMATIONS
         ========================================== */
      @keyframes criticalBlink {
        from { opacity: 1; }
        to { opacity: 0.3; }
      }

      @keyframes overlayFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes panelZoomIn {
        from { transform: scale(0.85); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

      @keyframes pulseGlitch {
        0%, 100% { opacity: 1; transform: scale(1); }
        92% { opacity: 1; transform: scale(1) skew(0); }
        94% { opacity: 0.8; transform: scale(1.02) skew(-3deg); }
        96% { opacity: 0.9; transform: scale(0.98) skew(2deg); }
        98% { opacity: 1; transform: scale(1) skew(0); }
      }

      @keyframes sssFlame {
        0% { transform: scale(1); filter: brightness(1); }
        100% { transform: scale(1.05) rotate(-2deg); filter: brightness(1.2); }
      }

      @keyframes glitchOpen {
        0% { clip-path: inset(40% 0 30% 0); }
        20% { clip-path: inset(10% 0 60% 0); }
        40% { clip-path: inset(80% 0 5% 0); }
        60% { clip-path: inset(30% 0 40% 0); }
        80% { clip-path: inset(0 0 0 0); }
        100% { clip-path: none; }
      }

      @media (max-width: 720px), (max-height: 760px) {
        body {
          gap: 0;
          padding: 8px;
        }
        #game-container {
          width: min(calc(100vw - 16px), 1280px, calc((100vh - 16px) * 16 / 9));
          border-radius: 8px;
        }
        .game-ui-overlay {
          padding: 12px;
        }
        .hud-footer {
          display: none;
        }
        .integrity-panel {
          padding: 6px 10px;
        }
        .bar-container {
          width: 140px;
        }
        .hp-numeric {
          right: 15px;
        }
        .score-value {
          font-size: 20px;
        }
        .sector-panel {
          font-size: 14px;
          padding: 4px 12px;
        }
        .terminal-panel {
          width: 90%;
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <!-- The Relative Wrapper containing Canvas and layered HTML Overlay -->
    <main id="game-container" aria-label="Ninjaman game container">
      
      <!-- Phaser Canvas placeholder -->
      <div id="phaser-game-canvas-container" style="width: 100%; height: 100%;"></div>

      <!-- HYBRID HTML/CSS INTERACTIVE HUD OVERLAY -->
      <div class="game-ui-overlay">
        
        <!-- Header HUD: HP readouts, Sectors, and Score -->
        <header class="hud-header">
          <!-- Integrity (Health) Panel -->
          <div class="integrity-panel">
            <span class="integrity-label">INTEGRITY</span>
            <div class="bar-container">
              <div id="hud-integrity-bar" class="integrity-bar"></div>
              <span id="hud-hp-numeric" class="hp-numeric">100 / 100</span>
            </div>
          </div>

          <!-- Sector progression tracker -->
          <div id="hud-sector-display" class="sector-panel">SECTOR 1: CITY SECTOR</div>

          <!-- Futuristic Score Panel -->
          <div class="score-panel">
            <span class="score-label">SCORE</span>
            <span id="hud-score-value" class="score-value">0</span>
          </div>
        </header>

        <!-- Floating DMC-style Rank letters (flashes in response to combat combos) -->
        <div id="hud-style-meter" class="style-meter-container">
          <span id="hud-style-letter" class="style-rank-letter rank-c">C</span>
        </div>

        <!-- Footer HUD: Keyboard controllers & procedurally generated Sound switches -->
        <footer class="hud-footer">
          <div class="controls-guide">
            Move <kbd>A</kbd>/<kbd>S</kbd>/<kbd>D</kbd>/<kbd>W</kbd> &nbsp;&middot;&nbsp; Jump <kbd>Space</kbd> &nbsp;&middot;&nbsp; Attack <kbd>J</kbd> &nbsp;&middot;&nbsp; Defend <kbd>K</kbd> &nbsp;&middot;&nbsp; Wave <kbd>L</kbd> &nbsp;&middot;&nbsp; Dash <kbd>Double-Tap</kbd>
          </div>
          <div id="hud-sound-toggle" class="sound-indicator interactive" onclick="window.toggleHUDGameSound()">
            SOUND: <span id="hud-sound-status">OFF</span>
          </div>
        </footer>

      </div>

      <!-- INTERACTIVE OVERLAY: SYSTEM PAUSED -->
      <div id="menu-pause-overlay" class="fullscreen-overlay">
        <div class="pause-panel">
          <h2 class="pause-title">SYSTEM PAUSED</h2>
          <p class="close-panel-tip" style="margin-top: 15px;">PRESS [ESC] TO RESUME ACTION</p>
        </div>
      </div>

      <!-- INTERACTIVE OVERLAY: GAME OVER / SECTOR SECURED -->
      <div id="menu-gameover-overlay" class="fullscreen-overlay interactive">
        <div class="terminal-panel gameover-panel">
          <h2 id="gameover-title" class="gameover-title">SECTOR COMPROMISED</h2>
          <div class="gameover-score-row">FINAL SCORE: <span id="gameover-score" style="color: var(--cyan);">0</span></div>
          <button id="btn-restart-game" class="restart-btn">REBOOT SYSTEM</button>
        </div>
      </div>

    </main>

    <!-- Phaser 4 script bootstrap -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
