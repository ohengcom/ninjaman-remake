  <polygon points="36,8 44,8 40,14" fill="#fab387" filter="url(#goldGlow)"/>
  <circle cx="40" cy="11" r="2.5" fill="#cdd6f4"/>
  <path d="M 24 38 L -4 60 Q 6 48 12 44 Z" fill="url(#spiritGold)" filter="url(#goldGlow)"/>
