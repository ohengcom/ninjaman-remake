<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
    <defs>
      <!-- Premium Oriental Cyber-Zen Filters -->
      <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4.5" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <filter id="heavyGoldGlow" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="7" result="blur1" />
        <feGaussianBlur stdDeviation="2.5" result="blur2" />
        <feMerge>
          <feMergeNode in="blur1" />
          <feMergeNode in="blur2" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <filter id="sakuraGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <filter id="inkMisty" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="1.8" />
      </filter>
      <filter id="redGlow" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="3.5" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>

      <!-- Advanced Cyber-Zen Gradients -->
      <linearGradient id="inkWashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#2a2a2a"/>
        <stop offset="60%" stop-color="#121212"/>
        <stop offset="100%" stop-color="#050505"/>
      </linearGradient>
      <linearGradient id="inkWashLight" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6e6e6e"/>
        <stop offset="50%" stop-color="#3c3c3c"/>
        <stop offset="100%" stop-color="#1c1c1c"/>
      </linearGradient>
      <linearGradient id="spiritGold" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="35%" stop-color="#ffe680"/>
        <stop offset="75%" stop-color="#e5c158"/>
        <stop offset="100%" stop-color="#b8860b"/>
      </linearGradient>
      <linearGradient id="sacredMaple" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ff2200"/>
        <stop offset="50%" stop-color="#d43f00"/>
        <stop offset="100%" stop-color="#800000"/>
      </linearGradient>
      <linearGradient id="sakuraBlade" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="40%" stop-color="#ffb3d9"/>
        <stop offset="85%" stop-color="#ff3399"/>
        <stop offset="100%" stop-color="#cc0066"/>
      </linearGradient>
      <linearGradient id="crimsonGaze" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ff3333"/>
        <stop offset="60%" stop-color="#aa0000"/>
        <stop offset="100%" stop-color="#550000"/>
      </linearGradient>
    </defs>
    
  <!-- Solid defensive posture -->
  <path d="M 22 25 L 50 25 L 44 55 L 26 55 Z" fill="url(#inkWashGrad)" stroke="#e5c158" stroke-width="1.8"/>
  <ellipse cx="36" cy="18" rx="22" ry="6" fill="url(#inkWashLight)" stroke="#e5c158" stroke-width="1.5"/>
  <path d="M 14 18 Q 36 2 58 18 Z" fill="url(#inkWashGrad)"/>

  <!-- Calligraphy Katana Blocking Position -->
  <path d="M 42 12 L 48 8 L 48 58 L 42 58 Z" fill="url(#spiritGold)" filter="url(#goldGlow)"/>

  <!-- High-Fidelity Calligraphy Bagua Shield Matrix -->
  <!-- Outer glowing zen circle (Enso shape) -->
  <circle cx="50" cy="36" r="32" fill="none" stroke="#e5c158" stroke-width="4.5" stroke-dasharray="160 40" filter="url(#heavyGoldGlow)" opacity="0.95"/>
  
  <!-- Inner Bagua symbols -->
  <circle cx="50" cy="36" r="22" fill="rgba(229, 193, 88, 0.08)" stroke="#e5c158" stroke-width="1.5" stroke-dasharray="6 3"/>
  <path d="M 50 22 C 40 22 40 36 50 36 C 60 36 60 50 50 50" fill="none" stroke="#e5c158" stroke-width="2"/>
  
  <!-- Digital brush details inside shield -->
  <circle cx="50" cy="29" r="2" fill="#e5c158"/>
  <circle cx="50" cy="43" r="2" fill="#ffffff"/>
  
  <!-- Impact spark beads -->
  <circle cx="72" cy="18" r="4.5" fill="#ffffff" filter="url(#goldGlow)"/>
  <circle cx="28" cy="48" r="4" fill="#e5c158" filter="url(#goldGlow)"/>

  </svg>