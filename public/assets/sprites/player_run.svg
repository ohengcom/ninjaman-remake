<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
    <defs>
      <!-- Premium Oriental Cyber-Zen Filters -->
      <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4.5" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <filter id="heavyGoldGlow" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="7" result="blur1" />
        <feGaussianBlur stdDeviation="2.5" result="blur2" />
        <feMerge>
          <feMergeNode in="blur1" />
          <feMergeNode in="blur2" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <filter id="sakuraGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <filter id="inkMisty" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="1.8" />
      </filter>
      <filter id="redGlow" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="3.5" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>

      <!-- Advanced Cyber-Zen Gradients -->
      <linearGradient id="inkWashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#2a2a2a"/>
        <stop offset="60%" stop-color="#121212"/>
        <stop offset="100%" stop-color="#050505"/>
      </linearGradient>
      <linearGradient id="inkWashLight" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6e6e6e"/>
        <stop offset="50%" stop-color="#3c3c3c"/>
        <stop offset="100%" stop-color="#1c1c1c"/>
      </linearGradient>
      <linearGradient id="spiritGold" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="35%" stop-color="#ffe680"/>
        <stop offset="75%" stop-color="#e5c158"/>
        <stop offset="100%" stop-color="#b8860b"/>
      </linearGradient>
      <linearGradient id="sacredMaple" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ff2200"/>
        <stop offset="50%" stop-color="#d43f00"/>
        <stop offset="100%" stop-color="#800000"/>
      </linearGradient>
      <linearGradient id="sakuraBlade" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="40%" stop-color="#ffb3d9"/>
        <stop offset="85%" stop-color="#ff3399"/>
        <stop offset="100%" stop-color="#cc0066"/>
      </linearGradient>
      <linearGradient id="crimsonGaze" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ff3333"/>
        <stop offset="60%" stop-color="#aa0000"/>
        <stop offset="100%" stop-color="#550000"/>
      </linearGradient>
    </defs>
    
  <g transform="rotate(18 40 40) translate(2, 2)">
    <!-- Haori blowing backwards in calligraphy shapes -->
    <path d="M 34 26 C 8 34 -12 44 -28 50 C -14 32 8 24 28 22" fill="url(#sacredMaple)" filter="url(#sakuraGlow)"/>
    <path d="M 34 26 C 0 24 -18 30 -32 34 C -20 20 6 18 26 20" fill="#cc1100" opacity="0.6"/>

    <!-- Sacred Sheathed Katana horizontal -->
    <path d="M 26 30 L -2 22 L 2 18 L 30 26 Z" fill="#1c1c1c" stroke="#e5c158" stroke-width="1.5"/>

    <!-- Sprinting mechanical body -->
    <path d="M 26 22 L 54 22 L 46 52 L 28 52 Z" fill="url(#inkWashGrad)" stroke="#e5c158" stroke-width="1.5"/>
    <circle cx="40" cy="33" r="6" fill="#e5c158" filter="url(#goldGlow)"/>
    
    <!-- Arm swinging -->
    <path d="M 22 24 L 8 36 L 12 42 L 26 30 Z" fill="url(#inkWashLight)"/>
    <circle cx="10" cy="39" r="3.5" fill="#e5c158" filter="url(#goldGlow)"/>

    <!-- Straw Hat tilted forward -->
    <ellipse cx="40" cy="14" rx="26" ry="7" fill="url(#inkWashLight)" stroke="#e5c158" stroke-width="2"/>
    <path d="M 14 14 C 14 2 66 2 66 14 Z" fill="url(#inkWashGrad)" stroke="#e5c158" stroke-width="1.5"/>
    <path d="M 32 16 L 40 21 L 48 16" fill="none" stroke="#e5c158" stroke-width="2.5" filter="url(#heavyGoldGlow)"/>
  </g>

  </svg>