name: Deploy Godot Web

on:
  push:
    branches: [main]
    paths:
      - 'godot/**'
      - 'scripts/export_godot_web.js'
      - '.github/workflows/deploy-godot.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot 4.6.3
        uses: barichello/godot-ci@v1
        with:
          godot-version: '4.6.3'
          export-templates: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Export Godot Web build
        env:
          GODOT_BIN: godot
        run: node scripts/export_godot_web.js

      - name: Verify export artifacts
        run: |
          test -f godot/build/web/index.html
          test -f godot/build/web/index.wasm
          test -f godot/build/web/index.pck

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Build Vercel output (prebuilt)
        working-directory: godot
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_GODOT_PROJECT_ID }}
        run: vercel build --yes

      - name: Deploy to Vercel (prebuilt, production)
        working-directory: godot
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_GODOT_PROJECT_ID }}
        run: vercel deploy --prebuilt --prod --yes
